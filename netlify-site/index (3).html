document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ay:flex; align-items:center; justify-content:space-between; gap:16px;\">\n      <div onclick=\"{{ onHome }}\" style=\"cursor:pointer; display:flex; align-items:center; gap:13px;\">\n        <span style=\"width:40px; height:40px; border-radius:11px; background:#2F6B66; color:#F1EDE4; font-family:'Spectral',serif; font-weight:600; font-size:20px; display:flex; align-items:center; justify-content:center; letter-spacing:-0.02em; flex:none;\">RL<\u002Fspan>\n        <span style=\"display:flex; flex-direction:column; line-height:1.05;\">\n          <span style=\"font-family:'Spectral',serif; font-weight:600; font-size:21px;\">Real Life<span style=\"color:#B07A3C;\">.<\u002Fspan><\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:9.5px; letter-spacing:0.18em; text-transform:uppercase; color:#7A746A; margin-top:2px;\">Menopause Cases<\u002Fspan>\n        <\u002Fspan>\n      <\u002Fdiv>\n      <button onclick=\"{{ onHome }}\" style=\"font-family:'Hanken Grotesk',sans-serif; font-size:13px; font-weight:600; color:#2F6B66; background:#fff; border:1px solid #CADAD7; border-radius:8px; padding:9px 16px; cursor:pointer; display:flex; align-items:center; gap:8px;\" style-hover=\"background:#2F6B66; color:#fff; border-color:#2F6B66;\">\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 11l9-8 9 8\"><\u002Fpath><path d=\"M5 10v10h14V10\"><\u002Fpath><\u002Fsvg>\n        Home\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <div style=\"max-width:1180px; margin:0 auto; padding:0 24px;\">\n\n    <sc-if value=\"{{ loading }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"padding:80px 0; text-align:center; color:#9A9488; font-family:'IBM Plex Mono',monospace; font-size:13px;\">Loading case library…<\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== LIBRARY VIEW ===================== -->\n    <sc-if value=\"{{ isLibrary }}\" hint-placeholder-val=\"{{ true }}\">\n    <div>\n\n      <!-- Hero -->\n      <section style=\"padding:54px 0 30px;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; letter-spacing:0.2em; text-transform:uppercase; color:#2F6B66; margin-bottom:16px;\">Evidence-based · case-based learning<\u002Fdiv>\n        <h1 style=\"font-family:'Spectral',serif; font-weight:600; font-size:52px; line-height:1.04; margin:0; letter-spacing:-0.015em; max-width:780px;\">Menopause cases for the everyday clinic<span style=\"color:#B07A3C;\">.<\u002Fspan><\u002Fh1>\n        <p style=\"font-size:17px; line-height:1.62; color:#5C5750; margin:18px 0 0; max-width:660px;\">Work through 51 real-world cases drawn from clinician questions. Commit to a management choice, then reveal the guideline-aligned approach, the reasoning, and a clinical pearl.<\u002Fp>\n      <\u002Fsection>\n\n      <!-- Dashboard -->\n      <section style=\"display:flex; gap:34px; flex-wrap:wrap; align-items:center; background:#fff; border:1px solid #E7E1D5; border-radius:14px; padding:26px 32px; box-shadow:0 1px 2px rgba(40,36,28,.03);\">\n        <div style=\"position:relative; width:132px; height:132px; flex:none;\">\n          <svg width=\"132\" height=\"132\" viewBox=\"0 0 132 132\">\n            <circle cx=\"66\" cy=\"66\" r=\"52\" fill=\"none\" stroke=\"{{ stats.ringTrack }}\" stroke-width=\"10\"><\u002Fcircle>\n            <circle cx=\"66\" cy=\"66\" r=\"52\" fill=\"none\" stroke=\"{{ stats.ringColor }}\" stroke-width=\"10\" stroke-linecap=\"round\" stroke-dasharray=\"{{ stats.ringDashArray }}\" stroke-dashoffset=\"{{ stats.ringDashOffset }}\" transform=\"rotate(-90 66 66)\"><\u002Fcircle>\n          <\u002Fsvg>\n          <div style=\"position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;\">\n            <div style=\"font-family:'Spectral',serif; font-size:30px; font-weight:600; line-height:1;\">{{ stats.accuracy }}<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:0.12em; color:#9A9488; text-transform:uppercase; margin-top:3px;\">accuracy<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:30px; flex-wrap:wrap;\">\n          <div>\n            <div style=\"font-family:'Spectral',serif; font-size:30px; font-weight:600; line-height:1;\">{{ stats.exploredLabel }}<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.06em; color:#7A746A; margin-top:6px;\">cases attempted<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-family:'Spectral',serif; font-size:30px; font-weight:600; line-height:1; color:#2F7A55;\">{{ stats.correctLabel }}<\u002Fdiv>\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.06em; color:#7A746A; margin-top:6px;\">answered well<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1; min-width:280px; display:grid; grid-template-columns:1fr 1fr; gap:7px 22px;\">\n          <sc-for list=\"{{ themeMastery }}\" as=\"m\" hint-placeholder-count=\"10\">\n            <div onclick=\"{{ m.onClick }}\" style=\"cursor:pointer; display:flex; align-items:center; gap:8px;\">\n              <span style=\"{{ m.dotStyle }}\"><\u002Fspan>\n              <span style=\"font-size:12px; color:#5C5750; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">{{ m.label }}<\u002Fspan>\n              <span style=\"width:54px; height:5px; border-radius:3px; background:#E2DCCF; position:relative; flex:none;\"><span style=\"{{ m.fillStyle }}\"><\u002Fspan><\u002Fspan>\n              <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; color:#9A9488; width:34px; text-align:right;\">{{ m.countLabel }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- Controls -->\n      <section style=\"margin-top:24px;\">\n        <div style=\"display:flex; gap:14px; align-items:center; flex-wrap:wrap; margin-bottom:16px;\">\n          <input value=\"{{ search }}\" oninput=\"{{ onSearch }}\" placeholder=\"Search cases, symptoms, drugs…\" style=\"flex:1; min-width:220px; font-family:'Hanken Grotesk',sans-serif; font-size:14px; color:#211F1B; background:#FBF9F4; border:1px solid #E2DCCF; border-radius:4px; padding:11px 14px; outline:none;\" style-focus=\"border-color:#2F6B66; background:#fff;\">\n          <div style=\"display:flex; gap:7px;\">\n            <sc-for list=\"{{ levelChips }}\" as=\"lv\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ lv.onClick }}\" style=\"{{ lv.style }}\">{{ lv.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <button onclick=\"{{ onResetAll }}\" style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.04em; color:#9A9488; background:none; border:none; cursor:pointer; padding:6px;\" style-hover=\"color:#B24A4A;\">reset progress<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"display:flex; gap:8px; flex-wrap:wrap;\">\n          <sc-for list=\"{{ themeChips }}\" as=\"t\" hint-placeholder-count=\"11\">\n            <button onclick=\"{{ t.onClick }}\" style=\"{{ t.style }}\"><span style=\"{{ t.dotStyle }}\"><\u002Fspan>{{ t.label }}<span style=\"opacity:.55; margin-left:2px;\">{{ t.countLabel }}<\u002Fspan><\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- Cards -->\n      <section style=\"margin-top:26px; display:grid; grid-template-columns:repeat(auto-fill,minmax(308px,1fr)); gap:16px;\">\n        <sc-for list=\"{{ filteredCases }}\" as=\"c\" hint-placeholder-count=\"9\">\n          <div onclick=\"{{ c.onClick }}\" style=\"background:#fff; border:1px solid #E7E1D5; border-radius:12px; padding:20px 22px 17px; cursor:pointer; display:flex; flex-direction:column; gap:11px; transition:box-shadow .18s, transform .18s, border-color .18s;\" style-hover=\"box-shadow:0 10px 28px -14px rgba(40,36,28,.42); transform:translateY(-3px); border-color:#D8D1C2;\">\n            <div style=\"display:flex; align-items:center; justify-content:space-between; gap:10px;\">\n              <span style=\"{{ c.chipStyle }}\"><span style=\"{{ c.dotStyle }}\"><\u002Fspan>{{ c.themeShort }}<\u002Fspan>\n              <span style=\"{{ c.statusStyle }}\">{{ c.statusLabel }}<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-family:'Spectral',serif; font-weight:600; font-size:19px; line-height:1.22; letter-spacing:-0.005em;\">{{ c.title }}<\u002Fdiv>\n            <div style=\"font-size:13.5px; line-height:1.55; color:#6A655C;\">{{ c.preview }}<\u002Fdiv>\n            <div style=\"display:flex; align-items:center; justify-content:space-between; margin-top:2px; padding-top:11px; border-top:1px solid #F0EBE0;\">\n              <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:#A39E93;\">{{ c.level }}<\u002Fspan>\n              <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:{{ accent }};\">open →<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fsection>\n\n      <sc-if value=\"{{ noResults }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"padding:60px 0; text-align:center;\">\n          <div style=\"font-family:'Spectral',serif; font-style:italic; font-size:20px; color:#7A746A;\">No cases match these filters.<\u002Fdiv>\n          <button onclick=\"{{ onClearFilters }}\" style=\"margin-top:14px; font-family:'IBM Plex Mono',monospace; font-size:12px; color:#2F6B66; background:none; border:1px solid #C8D6D3; border-radius:4px; padding:8px 16px; cursor:pointer;\">clear filters<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== CASE VIEW ===================== -->\n    <sc-if value=\"{{ isCase }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width:780px; margin:0 auto;\">\n\n      <div style=\"display:flex; align-items:center; justify-content:space-between; padding:26px 0 18px;\">\n        <button onclick=\"{{ onBack }}\" style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; color:#5C5750; background:none; border:none; cursor:pointer; padding:6px 0; display:flex; align-items:center; gap:6px;\" style-hover=\"color:#211F1B;\">← all cases<\u002Fbutton>\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#9A9488;\">{{ ac.posLabel }}<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff; border:1px solid #E7E1D5; border-radius:14px; padding:36px 40px 32px;\">\n        <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:20px;\">\n          <span style=\"{{ ac.chipStyle }}\"><span style=\"{{ ac.dotStyle }}\"><\u002Fspan>{{ ac.themeLabel }}<\u002Fspan>\n          <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:#A39E93;\">{{ ac.level }}<\u002Fspan>\n        <\u002Fdiv>\n\n        <h2 style=\"font-family:'Spectral',serif; font-weight:600; font-size:27px; line-height:1.18; margin:0 0 18px; letter-spacing:-0.01em;\">{{ ac.title }}<\u002Fh2>\n\n        <p style=\"font-family:'Spectral',serif; font-size:18px; line-height:1.62; color:#2B2924; margin:0 0 24px;\">{{ ac.stem }}<\u002Fp>\n\n        <div style=\"font-size:15px; font-weight:600; color:#211F1B; margin-bottom:14px; padding-top:18px; border-top:1px solid #F0EBE0;\">{{ ac.question }}<\u002Fdiv>\n\n        <div style=\"display:flex; flex-direction:column; gap:10px;\">\n          <sc-for list=\"{{ caseOptions }}\" as=\"o\" hint-placeholder-count=\"4\">\n            <div onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">\n              <span style=\"{{ o.letterStyle }}\">{{ o.letter }}<\u002Fspan>\n              <span style=\"flex:1; font-size:14.5px; line-height:1.5;\">{{ o.text }}<\u002Fspan>\n              <sc-if value=\"{{ o.badge }}\" hint-placeholder-val=\"\">\n                <span style=\"{{ o.badgeStyle }}\">{{ o.badge }}<\u002Fspan>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ canReveal }}\" hint-placeholder-val=\"{{ false }}\">\n          <button onclick=\"{{ onReveal }}\" style=\"{{ revealBtnStyle }}\">Commit &amp; reveal the evidence<\u002Fbutton>\n        <\u002Fsc-if>\n\n        <!-- Revealed content -->\n        <sc-if value=\"{{ revealed }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:26px;\">\n          <div style=\"{{ result.style }}\">{{ result.text }}<\u002Fdiv>\n\n          <div style=\"margin-top:22px;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:{{ accent }}; margin-bottom:9px;\">Evidence-based approach<\u002Fdiv>\n            <p style=\"font-size:15px; line-height:1.66; color:#33302A; margin:0;\">{{ ac.answer }}<\u002Fp>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ showPearls }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"margin-top:20px; background:#FBF4E9; border:1px solid #EBD9BD; border-left:3px solid #B07A3C; border-radius:4px; padding:16px 18px;\">\n            <div style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:#9A6A28; margin-bottom:7px;\">Clinical pearl<\u002Fdiv>\n            <div style=\"font-family:'Spectral',serif; font-size:16.5px; line-height:1.5; color:#4A3A1E; font-style:italic;\">{{ ac.pearl }}<\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ showCitations }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"margin-top:18px; font-family:'IBM Plex Mono',monospace; font-size:11px; color:#9A9488; display:flex; align-items:center; gap:8px;\">\n            <span style=\"display:inline-block; width:6px; height:6px; border-radius:50%; background:#C9C2B4;\"><\u002Fspan>{{ ac.cite }}\n          <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <button onclick=\"{{ onResetCase }}\" style=\"margin-top:18px; font-family:'IBM Plex Mono',monospace; font-size:11px; color:#9A9488; background:none; border:none; cursor:pointer; padding:0;\" style-hover=\"color:#5C5750;\">↺ try this case again<\u002Fbutton>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <!-- Prev / next -->\n      <div style=\"display:flex; align-items:center; justify-content:space-between; margin-top:18px; gap:12px;\">\n        <button onclick=\"{{ onPrev }}\" style=\"{{ prevStyle }}\">← Previous<\u002Fbutton>\n        <button onclick=\"{{ onNext }}\" style=\"{{ nextStyle }}\">Next case →<\u002Fbutton>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <footer style=\"margin-top:60px; padding-top:22px; border-top:1px solid #E2DCCF; font-family:'IBM Plex Mono',monospace; font-size:11px; color:#A39E93; line-height:1.7;\">\n      Real Life: Menopause Cases · A teaching resource for clinicians building menopause competency.<br>\n      Cases are de-identified, cleaned, and de-duplicated from real curbside questions; answers reflect current Menopause Society (NAMS) position statements and are for education only.\n    <\u002Ffooter>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: &quot;1200&quot;, &quot;height&quot;: &quot;920&quot; },\n  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#2F6B66&quot;, &quot;options&quot;: [&quot;#2F6B66&quot;, &quot;#3A5C99&quot;, &quot;#7A4A86&quot;, &quot;#4F7A3E&quot;], &quot;tsType&quot;: &quot;string&quot; },\n  &quot;showPearls&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; },\n  &quot;showCitations&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot; }\n}\">\n// Real Life: Menopause Cases — curated, de-duplicated teaching set\n// Distilled from 413 real-world clinician curbside questions into evidence-based\n// learning cases anchored to The Menopause Society (NAMS) position statements.\n// EDUCATIONAL USE ONLY — verify against primary guidelines before clinical decisions.\n\nconst THEMES = [\n  { key: \"mht\",        label: \"MHT selection & dosing\",        short: \"MHT\",        hue: 190 },\n  { key: \"bleeding\",   label: \"Bleeding, endometrium & IUDs\",  short: \"Bleeding\",   hue: 25  },\n  { key: \"vms\",        label: \"VMS & nonhormone therapy\",      short: \"VMS\",        hue: 145 },\n  { key: \"gsm\",        label: \"GSM & vaginal symptoms\",        short: \"GSM\",        hue: 320 },\n  { key: \"testosterone\", label: \"Testosterone & libido\",      short: \"Testosterone\", hue: 50 },\n  { key: \"thrombosis\", label: \"Thrombosis & clotting risk\",   short: \"Clotting\",   hue: 255 },\n  { key: \"bone\",       label: \"Bone, POI & early menopause\",  short: \"Bone / POI\", hue: 95  },\n  { key: \"breast\",     label: \"Breast cancer risk & screening\", short: \"Breast\",   hue: 350 },\n  { key: \"cardiometabolic\", label: \"Cardiometabolic risk\",    short: \"Cardiometabolic\", hue: 220 },\n  { key: \"principles\", label: \"Diagnosis & first principles\", short: \"Principles\", hue: 280 }\n];\n\nconst CASES = [\n  // ───────────── MHT selection, dosing & tolerability ─────────────\n  {\n    id: \"mht-01\", theme: \"mht\", level: \"Foundational\",\n    title: \"The patch that won't stick\",\n    stem: \"A 56-year-old on estradiol 0.05 mg patch + oral progesterone keeps developing skin irritation, and the patches fall off because she works out heavily. She wants to stay on transdermal therapy if possible.\",\n    question: \"What's the best next step for her estrogen delivery?\",\n    options: [\n      \"Prescribe a higher-dose patch and have her cut it to fit better\",\n      \"Switch to transdermal estradiol gel or spray, keeping the transdermal route\",\n      \"Stop estrogen — recurrent reactions suggest an estradiol allergy\",\n      \"Start a compounded systemic estradiol cream\"\n    ],\n    correct: 1,\n    answer: \"Adhesive irritation is not an estradiol allergy. Switching to transdermal estradiol gel or spray preserves the favorable transdermal profile (no first-pass effect, minimal VTE signal) while removing the adhesive. Oral estradiol is a fallback if no transdermal form is tolerated, but it forfeits the VTE advantage. Patches should never be cut — it disrupts the matrix delivery.\",\n    pearl: \"Adhesive reaction ≠ estradiol allergy. Stay transdermal with a gel or spray before abandoning the route.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n  {\n    id: \"mht-02\", theme: \"mht\", level: \"Foundational\",\n    title: \"Do I have to taper off?\",\n    stem: \"A 41-year-old with regular cycles and no vasomotor symptoms was started on an estradiol patch + progesterone by an outside provider purely for sleep. She wants to stop.\",\n    question: \"How should you discontinue her hormone therapy?\",\n    options: [\n      \"She must taper slowly over many months or risk harm\",\n      \"She can stop without a mandatory taper; tapering only blunts symptom rebound — and reassess whether she had a real indication\",\n      \"Increase the dose first, then withdraw\",\n      \"Continue indefinitely now that she's started\"\n    ],\n    correct: 1,\n    answer: \"There is no medical requirement to taper hormone therapy. A gradual reduction is offered only to soften a possible return of vasomotor symptoms — a matter of comfort, not safety. Here the deeper issue is indication: a cycling woman with no VMS started on systemic estrogen for sleep alone lacks a clear indication, so stopping is reasonable.\",\n    pearl: \"Tapering MHT is about symptom rebound, not safety. Always re-examine the original indication.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n  {\n    id: \"mht-03\", theme: \"mht\", level: \"Intermediate\",\n    title: \"How much progesterone with how much estrogen?\",\n    stem: \"A clinician is unsure whether micronized progesterone must increase from 100 mg to 200 mg every time the transdermal estradiol dose goes up for endometrial protection.\",\n    question: \"What's the principle for progestogen dosing?\",\n    options: [\n      \"Always 200 mg micronized progesterone regardless of estrogen dose\",\n      \"Continuous micronized progesterone 100 mg nightly (or 200 mg cyclically ×12–14 days) is adequate across usual estradiol doses; ensure adequacy and duration, and reassess protection at high estrogen doses\",\n      \"Scale progesterone linearly with the estrogen dose\",\n      \"No progestogen is needed below 0.05 mg estradiol\"\n    ],\n    correct: 1,\n    answer: \"Endometrial protection depends on giving an adequate progestogen for an adequate duration, not on a strict milligram-per-milligram ratio. Continuous micronized progesterone 100 mg nightly protects across standard transdermal estradiol doses; a cyclic alternative is 200 mg for 12–14 days each month. At higher estradiol doses, confirm protection is sufficient and watch for unscheduled bleeding.\",\n    pearl: \"It's adequacy and duration of the progestogen — not a fixed ratio. Any unopposed estrogen in a woman with a uterus is unsafe.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n  {\n    id: \"mht-04\", theme: \"mht\", level: \"Intermediate\",\n    title: \"Starting at 69, decades out\",\n    stem: \"A 69-year-old, postmenopausal since age 45, requests hormone therapy for hot flashes and fatigue. She has no contraindications, but is well beyond 10 years from her final menstrual period.\",\n    question: \"What's the most appropriate counseling?\",\n    options: [\n      \"Start standard-dose oral estrogen — she has no contraindications\",\n      \"Initiating systemic HT this far out has a less favorable benefit–risk balance; favor nonhormone VMS options, or discuss low-dose transdermal estradiol only through careful shared decision-making\",\n      \"Start HT specifically to reduce her dementia and cardiovascular risk\",\n      \"Start testosterone for the fatigue\"\n    ],\n    correct: 1,\n    answer: \"The timing hypothesis matters: initiating systemic estrogen more than 10 years past menopause or after age 60 carries higher coronary, stroke, and VTE risk and is not recommended for chronic-disease prevention. For bothersome VMS, prioritize nonhormone therapies; if she still wants hormones after understanding the shifted risk, the lowest-dose transdermal route with documented shared decision-making is the cautious option.\",\n    pearl: \"The 'window of opportunity' is about timing of initiation. Far from menopause, lead with nonhormone options.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n  {\n    id: \"mht-05\", theme: \"mht\", level: \"Intermediate\",\n    title: \"Chasing the estradiol level\",\n    stem: \"A patient's vasomotor symptoms resolved on her estradiol patch, but a serum estradiol drawn mid-patch came back 'low.' She's convinced she isn't absorbing it and wants the dose pushed up to a target level.\",\n    question: \"How should you respond?\",\n    options: [\n      \"Titrate the dose until the serum estradiol hits a target range\",\n      \"Treat symptoms, not the number — routine serum estradiol monitoring is unreliable and not recommended to titrate systemic HT\",\n      \"Switch to oral estrogen to raise the measured level\",\n      \"Stop therapy because absorption has failed\"\n    ],\n    correct: 1,\n    answer: \"Serum estradiol levels correlate poorly with symptom relief and are not recommended for routine titration of systemic hormone therapy; assays vary and single draws miss the dosing curve. Her resolved VMS is the relevant endpoint. Level-checking is reserved for special cases — POI, suspected non-absorption with persistent symptoms, or compounded preparations.\",\n    pearl: \"Titrate MHT to symptoms, not to a serum estradiol number. Levels are for the exceptions, not the rule.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n  {\n    id: \"mht-06\", theme: \"mht\", level: \"Foundational\",\n    title: \"She only wants 'bioidentical'\",\n    stem: \"A patient transferring care is on compounded estradiol/progesterone/DHEA and insists on 'bioidentical only,' declining what she believes are 'synthetic' FDA-approved products.\",\n    question: \"What's the key counseling point?\",\n    options: [\n      \"Continue the compounded regimen — it's equivalent to approved products\",\n      \"FDA-approved estradiol and micronized progesterone ARE bioidentical (body-identical) and are preferred over custom-compounded products, which lack regulated purity, dosing, and safety data; pellets are not recommended\",\n      \"Switch her to compounded pellets for steadier levels\",\n      \"Add compounded testosterone to round out the regimen\"\n    ],\n    correct: 1,\n    answer: \"'Bioidentical' is not a synonym for 'compounded.' FDA-approved transdermal estradiol and oral micronized progesterone are structurally identical to endogenous hormones and are regulated for purity and dose. Custom-compounded preparations and pellets carry unpredictable dosing, supraphysiologic exposure, and no efficacy/safety oversight, and are not recommended.\",\n    pearl: \"Approved estradiol and micronized progesterone are already bioidentical. Steer away from compounded products and pellets.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n  {\n    id: \"mht-07\", theme: \"mht\", level: \"Foundational\",\n    title: \"Give it time — or change it?\",\n    stem: \"A 43-year-old felt great on estradiol 0.05 patch + progesterone 100 mg, then her hot flashes returned a month later. A colleague suggests increasing the estradiol immediately.\",\n    question: \"What's the most reasonable approach?\",\n    options: [\n      \"Immediately escalate the estradiol dose\",\n      \"Confirm an adequate trial and adherence, rule out other causes, then titrate the estrogen for persistent VMS — recognizing sleep and mood respond to different levers\",\n      \"Stop therapy and reassess in 3 months\",\n      \"Add testosterone for the returning symptoms\"\n    ],\n    correct: 1,\n    answer: \"Each dose deserves an adequate trial (often up to ~8–12 weeks) and a check on adherence and absorption before escalation. Persistent vasomotor symptoms are an appropriate reason to titrate estrogen upward; but if the chief complaint is sleep, remember sleep is multifactorial and progesterone timing/dose is a separate lever. Reassess what symptom is actually driving the visit.\",\n    pearl: \"Match the lever to the symptom: estrogen for VMS, separate work-up for sleep. Give each change an adequate trial.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n  {\n    id: \"mht-08\", theme: \"mht\", level: \"Advanced\",\n    title: \"Stable on IM estradiol — leave it?\",\n    stem: \"A new patient arrives on intramuscular estradiol valerate 10 mg weekly + progesterone 200 mg, with no bothersome symptoms. She's happy and stable.\",\n    question: \"How do you handle the non-standard regimen?\",\n    options: [\n      \"Continue it indefinitely without comment since she's stable\",\n      \"Counsel that injectable estradiol produces supraphysiologic, fluctuating levels and isn't a recommended MHT route; offer transition to evidence-based transdermal or oral estradiol through shared decision-making\",\n      \"Increase the dose to reduce the peak-trough swing\",\n      \"Add a pellet for steadier delivery\"\n    ],\n    correct: 1,\n    answer: \"Intramuscular and pellet estradiol generate supraphysiologic peaks and unpredictable troughs and are not recommended routes for menopausal hormone therapy. Even in a stable, satisfied patient, the right move is informed counseling and an offer to transition to standard transdermal or oral estradiol — respecting her autonomy if she declines after understanding the trade-offs.\",\n    pearl: \"IM and pellet estradiol = supraphysiologic, erratic levels. Offer a transition to standard transdermal/oral dosing.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n  {\n    id: \"mht-09\", theme: \"mht\", level: \"Foundational\",\n    title: \"All my friends are on it\",\n    stem: \"A 56-year-old with minimal, non-disruptive joint aches and brain fog requests MHT because her friends are taking it and she feels she's 'missing out.' She has no bothersome VMS or GSM.\",\n    question: \"What's the most appropriate stance?\",\n    options: [\n      \"Start MHT because the patient requests it\",\n      \"MHT is indication-driven (bothersome VMS/GSM, POI/early menopause, bone protection in candidates); for mild non-bothersome symptoms, use shared decision-making, lifestyle measures, and reassessment rather than reflexive prescribing\",\n      \"Refuse hormone therapy categorically\",\n      \"Start testosterone instead\"\n    ],\n    correct: 1,\n    answer: \"Hormone therapy is prescribed for an indication — meaningfully bothersome vasomotor or genitourinary symptoms, primary ovarian insufficiency/early menopause, or bone protection in appropriate candidates — not for peer-driven prevention of mild symptoms. Counsel on realistic benefits, address lifestyle contributors, and keep the door open if symptoms become bothersome.\",\n    pearl: \"No bothersome symptoms = weak indication. Prescribe for an indication, not for FOMO.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n  {\n    id: \"mht-10\", theme: \"mht\", level: \"Intermediate\",\n    title: \"Can't tolerate the progesterone\",\n    stem: \"A woman with a uterus develops significant bloating, reflux, and sedation on oral micronized progesterone but needs endometrial protection alongside her estradiol patch. She declines an IUD initially.\",\n    question: \"What's the safest strategy?\",\n    options: [\n      \"Stop the progesterone and continue estrogen alone\",\n      \"Keep her protected by switching strategies: bedtime dosing, vaginal micronized progesterone (off-label), or a 52-mg LNG-IUS — never leave estrogen unopposed\",\n      \"Switch her to testosterone instead\",\n      \"Move to a compounded progesterone cream for protection\"\n    ],\n    correct: 1,\n    answer: \"A woman with a uterus on systemic estrogen must have endometrial protection; the goal is to find a tolerable progestogen, not to drop it. Options for intolerance include bedtime dosing of oral micronized progesterone, vaginal micronized progesterone (off-label but used), or a 52-mg LNG-IUS. Compounded progesterone creams lack data for endometrial protection and shouldn't be relied on.\",\n    pearl: \"Progesterone intolerance is solved by changing route (vaginal, LNG-IUS) — never by leaving estrogen unopposed.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n\n  // ───────────── Bleeding, endometrium, contraception & IUDs ─────────────\n  {\n    id: \"bleed-01\", theme: \"bleeding\", level: \"Intermediate\",\n    title: \"Unscheduled bleeding a year in\",\n    stem: \"A postmenopausal woman on continuous estradiol + progesterone for over a year develops new unscheduled vaginal bleeding. Her pelvic exam is normal.\",\n    question: \"What's the appropriate response?\",\n    options: [\n      \"Reassure her — bleeding on EPT never needs evaluation\",\n      \"Evaluate with transvaginal ultrasound ± endometrial biopsy; unscheduled bleeding after the first 3–6 months of continuous EPT (or any bleeding once established postmenopausal) warrants assessment\",\n      \"Just increase the progesterone dose and watch\",\n      \"Stop hormone therapy and do nothing further\"\n    ],\n    correct: 1,\n    answer: \"Light irregular bleeding is common in the first 3–6 months of continuous combined therapy, but new or persistent unscheduled bleeding beyond that — or any bleeding in an established postmenopausal woman — requires evaluation to exclude endometrial pathology. The ≤4 mm endometrial-thickness reassurance threshold applies to spontaneous postmenopausal bleeding off HT; on HT, keep a low threshold for biopsy.\",\n    pearl: \"Bleeding after the early settling-in window of continuous EPT — or any PMB off HT — gets a work-up.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n  {\n    id: \"bleed-02\", theme: \"bleeding\", level: \"Foundational\",\n    title: \"Which IUD actually protects?\",\n    stem: \"A clinician asks whether all levonorgestrel IUDs provide endometrial protection when paired with systemic estrogen, or only some.\",\n    question: \"Which statement is correct?\",\n    options: [\n      \"All LNG-IUDs protect the endometrium equally\",\n      \"The 52-mg LNG-IUS (Mirena/Liletta) is used (off-label in the US) for endometrial protection; lower-dose devices (Kyleena/Skyla) are not established for this purpose\",\n      \"The copper IUD provides endometrial protection\",\n      \"No IUD provides endometrial protection\"\n    ],\n    correct: 1,\n    answer: \"Only the 52-mg levonorgestrel IUS (Mirena, Liletta) delivers enough local progestin to be used for endometrial protection with systemic estrogen — and even that is off-label in the US. Lower-dose systems (Kyleena 19.5 mg, Skyla 13.5 mg) have not been validated for this, and the copper IUD provides none.\",\n    pearl: \"For endometrial protection, only the 52-mg LNG-IUS counts — not the low-dose hormonal or copper devices.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n  {\n    id: \"bleed-03\", theme: \"bleeding\", level: \"Intermediate\",\n    title: \"Mirena past its contraceptive prime\",\n    stem: \"A 49-year-old on transdermal estradiol has a 52-mg LNG-IUS placed 6 years ago, still providing contraception. She asks whether it still protects her endometrium.\",\n    question: \"What's the right guidance?\",\n    options: [\n      \"It protects the endometrium indefinitely as long as it's in place\",\n      \"For endometrial protection with systemic estrogen, the 52-mg LNG-IUS should be replaced roughly every 5 years; if overdue, replace it or add an oral progestogen\",\n      \"Remove it; IUDs can't be used for endometrial protection\",\n      \"Switch her to a lower-dose hormonal IUD\"\n    ],\n    correct: 1,\n    answer: \"The contraceptive lifespan of the 52-mg LNG-IUS (up to 8 years) is longer than its validated duration for endometrial protection with systemic estrogen, which is about 5 years. Once past that window, replace the device or add an oral progestogen to maintain protection.\",\n    pearl: \"Contraceptive lifespan ≠ endometrial-protection lifespan. For MHT, treat the 52-mg LNG-IUS as a ~5-year device.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n  {\n    id: \"bleed-04\", theme: \"bleeding\", level: \"Intermediate\",\n    title: \"Does Depo count as protection?\",\n    stem: \"A patient on transdermal estradiol who couldn't get an IUD placed was given depot medroxyprogesterone and told to stop her oral progesterone.\",\n    question: \"Is DMPA adequate endometrial protection here?\",\n    options: [\n      \"Yes — DMPA is an accepted progestogen for endometrial protection in MHT\",\n      \"No — DMPA is not established for endometrial protection in MHT; maintain a validated progestogen (oral micronized progesterone, vaginal progesterone, or 52-mg LNG-IUS)\",\n      \"Stop the estrogen entirely instead\",\n      \"No progestogen of any kind is needed with transdermal estrogen\"\n    ],\n    correct: 1,\n    answer: \"Depot medroxyprogesterone is a contraceptive, not a validated component of menopausal hormone therapy for endometrial protection. With systemic estrogen in a woman with a uterus, use a regimen with established protection — oral micronized progesterone, vaginal progesterone (off-label), or the 52-mg LNG-IUS — rather than relying on DMPA.\",\n    pearl: \"Don't borrow contraceptive progestins (DMPA, low-dose IUDs, POPs) as MHT endometrial protection unless validated.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n  {\n    id: \"bleed-05\", theme: \"bleeding\", level: \"Foundational\",\n    title: \"A 'period' after stopping the pill\",\n    stem: \"A 51-year-old stopped a continuous combined oral contraceptive; her FSH two months later is in the postmenopausal range. Three weeks ago she had what felt like a full period.\",\n    question: \"How should this bleeding be treated?\",\n    options: [\n      \"Reassure her as a withdrawal bleed and take no action\",\n      \"Treat it as postmenopausal bleeding and evaluate it (TVUS ± endometrial biopsy)\",\n      \"Restart the oral contraceptive\",\n      \"Start hormone therapy to regulate her cycle\"\n    ],\n    correct: 1,\n    answer: \"Once a woman is established as postmenopausal, new bleeding is postmenopausal bleeding until proven otherwise and warrants evaluation to exclude endometrial pathology — the recent COC and a single FSH don't make this a 'safe' withdrawal bleed to dismiss. Work it up.\",\n    pearl: \"Bleeding in an established postmenopausal woman is PMB until proven otherwise — always evaluate.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n  {\n    id: \"bleed-06\", theme: \"bleeding\", level: \"Intermediate\",\n    title: \"Stacking estrogen on the pill\",\n    stem: \"A premenopausal woman on a combined oral contraceptive has perimenopausal symptoms, and a clinician asks whether adding a low-dose estradiol patch is fine because 'the pill covers the progesterone.'\",\n    question: \"What's the correct approach?\",\n    options: [\n      \"Yes — add the estradiol patch; the COC's progestin covers the endometrium\",\n      \"Don't layer systemic estrogen on top of a combined contraceptive — it already supplies estrogen and progestin; choose one strategy (optimize/continue the contraceptive, or transition to MHT) rather than stacking\",\n      \"Add the patch and also add oral progesterone\",\n      \"Stop the pill and use the patch alone with no progestogen\"\n    ],\n    correct: 1,\n    answer: \"A combined contraceptive already delivers systemic estrogen plus a progestin; adding an estradiol patch on top is unnecessary and increases estrogen exposure without benefit. The right framing is to pick one approach — manage perimenopause with the contraceptive (if no contraindications and contraception is needed) or transition to menopausal hormone therapy — not to combine them.\",\n    pearl: \"Pick one systemic strategy. Don't add MHT estrogen on top of a combined contraceptive.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n  {\n    id: \"bleed-07\", theme: \"bleeding\", level: \"Advanced\",\n    title: \"Will Slynd protect the endometrium?\",\n    stem: \"A patient on transdermal estradiol 0.075 mg is taking a drospirenone-only pill (Slynd), not continuously, and the clinician asks if it provides endometrial protection.\",\n    question: \"What's the evidence-based answer?\",\n    options: [\n      \"Yes — drospirenone-only pills are well established for endometrial protection\",\n      \"Progestin-only contraceptive pills (including drospirenone) are not established or approved for endometrial protection in MHT; use micronized progesterone, an adequate progestin regimen, or the 52-mg LNG-IUS\",\n      \"Only at low estradiol doses\",\n      \"Norethindrone POPs protect but drospirenone does not\"\n    ],\n    correct: 1,\n    answer: \"Contraceptive progestin-only pills, including drospirenone (Slynd), are not validated or approved as the progestogen component of menopausal hormone therapy for endometrial protection, and they commonly cause irregular bleeding that confounds surveillance. Use micronized progesterone, a regimen with documented endometrial protection, or the 52-mg LNG-IUS.\",\n    pearl: \"POPs are contraceptives, not validated MHT endometrial protection — and their breakthrough bleeding muddies the picture.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n  {\n    id: \"bleed-08\", theme: \"bleeding\", level: \"Intermediate\",\n    title: \"Migraine with aura wants hormones\",\n    stem: \"A perimenopausal woman with migraine WITH aura and bothersome hot flashes asks about hormonal options. A friend who's a neurologist suggested 'a little estrogen gel.'\",\n    question: \"What's the safest path?\",\n    options: [\n      \"A combined estrogen-containing contraceptive is fine for her symptoms\",\n      \"Avoid combined hormonal contraceptives (ethinyl estradiol) given aura/stroke risk; low-dose transdermal estradiol for menopausal VMS is a different, generally acceptable risk profile\",\n      \"No estrogen of any form can be used with aura\",\n      \"Use oral estradiol to better control symptoms\"\n    ],\n    correct: 1,\n    answer: \"Migraine with aura contraindicates ethinyl-estradiol-containing combined contraceptives because of ischemic stroke risk. Physiologic low-dose transdermal estradiol used for menopausal symptoms is a distinct, lower-risk exposure and is generally considered acceptable, with the transdermal route preferred. Pair with a progestogen if she has a uterus.\",\n    pearl: \"Aura bars combined contraceptives — but low-dose transdermal estradiol for menopause is a different conversation.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n  {\n    id: \"bleed-09\", theme: \"bleeding\", level: \"Intermediate\",\n    title: \"Heavier perimenopausal periods\",\n    stem: \"A perimenopausal woman with obesity and type 2 diabetes reports her periods have become heavier and closer together. A colleague suggests chalking it up to perimenopause.\",\n    question: \"What should you do?\",\n    options: [\n      \"Assume it's anovulatory perimenopausal bleeding and reassure\",\n      \"Evaluate the abnormal bleeding (TVUS ± endometrial biopsy) — endometrial cancer risk factors (obesity, diabetes, PCOS, chronic anovulation/unopposed estrogen) lower the threshold to investigate\",\n      \"Start hormone therapy to regulate the bleeding\",\n      \"Order labs only and defer imaging\"\n    ],\n    correct: 1,\n    answer: \"Heavy or irregular perimenopausal bleeding is common, but risk factors for endometrial hyperplasia/cancer — obesity, diabetes, PCOS, chronic anovulation with unopposed estrogen — mandate evaluation rather than reassurance. Assess with transvaginal ultrasound and a low threshold for endometrial biopsy before attributing it to 'normal' perimenopause.\",\n    pearl: \"Risk-stratify perimenopausal bleeding. Obesity/diabetes/PCOS = evaluate, don't assume.\",\n    cite: \"Menopause Practice: A Clinician's Guide, 6th ed.\"\n  },\n  {\n    id: \"bleed-10\", theme: \"bleeding\", level: \"Advanced\",\n    title: \"Endometriosis after hysterectomy\",\n    stem: \"A 46-year-old had a hysterectomy for severe endometriosis but most implants were not excised. She needs estrogen for symptoms. The clinician wonders whether a progestogen is still warranted despite the absent uterus.\",\n    question: \"What's the most reasonable plan?\",\n    options: [\n      \"Estrogen alone is always fine after hysterectomy\",\n      \"With significant residual endometriosis, consider adding a progestogen (or a combined regimen) even without a uterus to reduce stimulation/recurrence risk — individualize via shared decision-making\",\n      \"Avoid all estrogen permanently\",\n      \"Use testosterone instead of estrogen\"\n    ],\n    correct: 1,\n    answer: \"Although a progestogen is normally unnecessary after hysterectomy, unopposed estrogen can reactivate residual endometriotic tissue and, rarely, drive malignant transformation. In women with substantial residual disease, adding a progestogen (or using a combined preparation/tibolone) is a reasonable, individualized strategy to limit estrogenic stimulation.\",\n    pearl: \"Significant residual endometriosis is the exception where a progestogen may be added even without a uterus.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n\n  // ───────────── VMS & nonhormone therapy ─────────────\n  {\n    id: \"vms-01\", theme: \"vms\", level: \"Foundational\",\n    title: \"Nonhormone VMS toolkit\",\n    stem: \"A woman with a strong family history of breast cancer declines hormone therapy but has disruptive hot flashes and wants effective nonhormone treatment.\",\n    question: \"What can you offer with evidence behind it?\",\n    options: [\n      \"Only hormone therapy meaningfully treats hot flashes\",\n      \"Evidence-based nonhormone options: SSRIs/SNRIs (low-dose paroxetine is FDA-approved), gabapentin, oxybutynin, fezolinetant, plus cognitive behavioral therapy and clinical hypnosis\",\n      \"Start with over-the-counter botanical supplements\",\n      \"Testosterone therapy for hot flashes\"\n    ],\n    correct: 1,\n    answer: \"The 2023 nonhormone position statement supports several effective options: SSRIs/SNRIs (low-dose paroxetine 7.5 mg is the only FDA-approved nonhormone drug specifically for VMS), gabapentin, oxybutynin, and the NK3-receptor antagonist fezolinetant — alongside cognitive behavioral therapy and clinical hypnosis. Most botanical supplements lack consistent efficacy.\",\n    pearl: \"There's a real nonhormone toolkit. Paroxetine 7.5 mg and fezolinetant are the on-label drug options; CBT and hypnosis work too.\",\n    cite: \"TMS 2023 Nonhormone Therapy Position Statement\"\n  },\n  {\n    id: \"vms-02\", theme: \"vms\", level: \"Advanced\",\n    title: \"Adding fezolinetant to MHT?\",\n    stem: \"A woman on low-dose estradiol has residual hot flashes and wants to add fezolinetant. A colleague claims you 'can't give fezolinetant with MHT.'\",\n    question: \"What's accurate?\",\n    options: [\n      \"Combining them is absolutely contraindicated\",\n      \"Fezolinetant was studied as an alternative to hormone therapy, not in combination; concurrent use isn't established — optimize the HT dose or switch, rather than assuming a hard contraindication\",\n      \"Always combine them for additive effect\",\n      \"Stop the estrogen before any VMS drug\"\n    ],\n    correct: 1,\n    answer: \"Fezolinetant trials evaluated it as an alternative to hormone therapy and excluded concurrent systemic estrogen, so the combination simply isn't studied — that's different from an absolute contraindication. The pragmatic move for residual VMS is to optimize the estrogen dose first, or transition between strategies, rather than stacking unstudied therapy. Note hepatic monitoring requirements for fezolinetant.\",\n    pearl: \"'Not studied together' ≠ 'contraindicated.' Optimize HT or switch; don't reflexively stack.\",\n    cite: \"TMS 2023 Nonhormone Therapy Position Statement\"\n  },\n  {\n    id: \"vms-03\", theme: \"vms\", level: \"Foundational\",\n    title: \"Just give me supplements\",\n    stem: \"A patient with mild symptoms wants a list of supplements to take instead of any prescription therapy.\",\n    question: \"How do you counsel her?\",\n    options: [\n      \"Provide a curated supplement list as effective therapy\",\n      \"Counsel that most botanicals (e.g., black cohosh, phytoestrogens) lack consistent efficacy evidence and aren't tightly regulated; offer evidence-based behavioral options (CBT, weight, sleep, alcohol/trigger reduction)\",\n      \"Recommend compounded hormones as a 'natural' compromise\",\n      \"Tell her nothing can help mild symptoms\"\n    ],\n    correct: 1,\n    answer: \"Evidence for botanical and OTC supplements in VMS is inconsistent, and products are not standardized or rigorously regulated. Be honest about the limited data, flag potential interactions, and offer evidence-based behavioral approaches — cognitive behavioral therapy, weight management, sleep hygiene, and trigger reduction — for milder symptoms.\",\n    pearl: \"Don't oversell supplements. Offer evidence-based behavioral options and be candid about weak data.\",\n    cite: \"TMS 2023 Nonhormone Therapy Position Statement\"\n  },\n\n  // ───────────── GSM & vaginal symptoms ─────────────\n  {\n    id: \"gsm-01\", theme: \"gsm\", level: \"Foundational\",\n    title: \"Vaginal estrogen with a clot history\",\n    stem: \"A 52-year-old with a prior DVT/PE (provoked, on a contraceptive ring years ago) now has bothersome vaginal dryness and painful sex. She asks if vaginal estrogen is safe.\",\n    question: \"What's the correct counseling?\",\n    options: [\n      \"Vaginal estrogen is contraindicated given her clot history\",\n      \"Low-dose vaginal estrogen has minimal systemic absorption and is appropriate for GSM even with a VTE history; it does not require a progestogen\",\n      \"She needs a systemic estrogen dose to help\",\n      \"She must add a progestogen for protection\"\n    ],\n    correct: 1,\n    answer: \"Low-dose vaginal estrogen produces minimal systemic absorption, does not meaningfully raise VTE risk, and is appropriate for genitourinary syndrome of menopause even in women with a thrombotic history. Because systemic exposure is negligible, a progestogen is not required, and routine endometrial surveillance isn't needed in asymptomatic users.\",\n    pearl: \"Low-dose vaginal estrogen is essentially local — safe with VTE history, and no progestogen needed.\",\n    cite: \"TMS 2020 GSM Position Statement\"\n  },\n  {\n    id: \"gsm-02\", theme: \"gsm\", level: \"Advanced\",\n    title: \"GSM in a breast cancer survivor\",\n    stem: \"A 57-year-old with a remote history of ER+ DCIS (lumpectomy + radiation, not on tamoxifen, not on an aromatase inhibitor) has severe GSM unrelieved by lubricants.\",\n    question: \"What's the appropriate approach?\",\n    options: [\n      \"Vaginal estrogen is absolutely and permanently contraindicated\",\n      \"After nonhormone measures fail, low-dose vaginal estrogen may be considered with shared decision-making and oncology coordination — with extra caution in women on aromatase inhibitors\",\n      \"Start systemic hormone therapy instead\",\n      \"Restrict her to lubricants and moisturizers indefinitely\"\n    ],\n    correct: 1,\n    answer: \"Vaginal estrogen is not an absolute lifelong contraindication in breast cancer survivors. First-line is nonhormone therapy (moisturizers, lubricants); when symptoms persist, low-dose vaginal estrogen may be considered through shared decision-making with the oncology team. Caution is greatest for women on aromatase inhibitors, where even minimal systemic estrogen is a theoretical concern; tamoxifen users have more latitude.\",\n    pearl: \"Survivor ≠ absolute no. Try nonhormone first, coordinate with oncology, and be most cautious on aromatase inhibitors.\",\n    cite: \"TMS 2020 GSM Position Statement\"\n  },\n  {\n    id: \"gsm-03\", theme: \"gsm\", level: \"Intermediate\",\n    title: \"GSM not responding to vaginal estrogen\",\n    stem: \"A postmenopausal woman started on vaginal estradiol still has dryness and dyspareunia after appropriate use.\",\n    question: \"What are the next steps?\",\n    options: [\n      \"Stop all therapy and use lubricants only\",\n      \"Reassess adherence/technique, then consider other GSM-specific options — vaginal DHEA (prasterone) or oral ospemifene — and transition rather than necessarily combine\",\n      \"Escalate immediately to systemic hormone therapy\",\n      \"Add a testosterone cream to the vagina\"\n    ],\n    correct: 1,\n    answer: \"First confirm she's using the vaginal estrogen correctly and consistently and has allowed enough time (often 8–12 weeks). If GSM persists, other local options include vaginal DHEA (prasterone) and the oral SERM ospemifene; you generally transition between agents rather than stacking. Systemic HT isn't the answer for isolated GSM.\",\n    pearl: \"Confirm adherence first; then GSM has more than one local lever — DHEA and ospemifene.\",\n    cite: \"TMS 2020 GSM Position Statement\"\n  },\n  {\n    id: \"gsm-04\", theme: \"gsm\", level: \"Foundational\",\n    title: \"Does vaginal estrogen need progesterone?\",\n    stem: \"Several patients report 'systemic' improvements on vaginal estrogen, and a clinician wonders whether a progestogen is needed to balance it.\",\n    question: \"What's correct?\",\n    options: [\n      \"Yes — add a progestogen to balance vaginal estrogen\",\n      \"No — low-dose vaginal estrogen doesn't require a progestogen, and routine endometrial surveillance isn't needed in asymptomatic users; evaluate any bleeding\",\n      \"Stop the vaginal estrogen because of systemic absorption\",\n      \"Switch to a systemic regimen with a progestogen\"\n    ],\n    correct: 1,\n    answer: \"Low-dose vaginal estrogen does not require an opposing progestogen, and asymptomatic users don't need routine endometrial monitoring. Reported 'systemic' benefit is usually relief of urogenital symptoms improving quality of life, not meaningful systemic estrogenization. Any vaginal bleeding, however, still warrants evaluation.\",\n    pearl: \"No progestogen for low-dose vaginal estrogen — but investigate any bleeding regardless.\",\n    cite: \"TMS 2020 GSM Position Statement\"\n  },\n\n  // ───────────── Testosterone & libido ─────────────\n  {\n    id: \"test-01\", theme: \"testosterone\", level: \"Foundational\",\n    title: \"Testosterone for energy and focus?\",\n    stem: \"A postmenopausal woman on estradiol + progesterone requests testosterone for brain fog, poor concentration, and fatigue.\",\n    question: \"What's the evidence-based counseling?\",\n    options: [\n      \"Prescribe testosterone for her energy and cognition\",\n      \"The only evidence-based indication for testosterone in women is hypoactive sexual desire disorder (HSDD) in postmenopausal women; evidence does not support it for energy, cognition, mood, muscle, or weight\",\n      \"Check her level and treat if low\",\n      \"Start testosterone pellets for sustained effect\"\n    ],\n    correct: 1,\n    answer: \"Global consensus supports testosterone in women for one indication: postmenopausal HSDD after other contributors are addressed. There is insufficient evidence to use it for fatigue, cognition, mood, bone, muscle mass, or weight. Counsel her that it's unlikely to help these symptoms and pursue targeted work-ups instead.\",\n    pearl: \"Testosterone in women = postmenopausal HSDD only. It's not a tonic for energy or brain fog.\",\n    cite: \"Global Consensus Position Statement on Testosterone Therapy for Women (2019)\"\n  },\n  {\n    id: \"test-02\", theme: \"testosterone\", level: \"Intermediate\",\n    title: \"How do you dose female testosterone?\",\n    stem: \"A clinician is unsure how to dose testosterone for a woman with HSDD and how to monitor it. A patient on compounded 1% cream jumped from a total testosterone of 30 to 133 ng/dL.\",\n    question: \"What's the correct dosing principle?\",\n    options: [\n      \"Use male dosing or pellets for reliable effect\",\n      \"Use roughly one-tenth of the male dose to keep total testosterone within the premenopausal physiologic range; check a baseline and follow-up level to avoid supraphysiologic exposure; avoid pellets and injectables\",\n      \"Titrate to a high-normal male level for best effect\",\n      \"No monitoring is necessary once started\"\n    ],\n    correct: 1,\n    answer: \"Dose to physiology: approximately one-tenth of the male dose, aiming to keep total testosterone within the normal premenopausal female range. Check a baseline and a follow-up level — not to chase symptom response, but to ensure you haven't pushed her supraphysiologic (as in this patient at 133). Pellets and injections deliver supraphysiologic, erratic levels and are not recommended.\",\n    pearl: \"Physiologic dosing (~1/10 male dose); monitor to avoid a supraphysiologic ceiling; no pellets/injections.\",\n    cite: \"Global Consensus Position Statement on Testosterone Therapy for Women (2019)\"\n  },\n  {\n    id: \"test-03\", theme: \"testosterone\", level: \"Intermediate\",\n    title: \"Her level is low — is that the diagnosis?\",\n    stem: \"A patient has had very low total testosterone (<3 ng/dL) on two draws by another provider, and the clinician wonders if this confirms a deficiency to treat.\",\n    question: \"How should the level be used?\",\n    options: [\n      \"A low level confirms deficiency — treat it\",\n      \"There is no testosterone threshold that diagnoses 'deficiency' in women; don't treat based on a low level — HSDD is a clinical diagnosis, and levels are used mainly to avoid supraphysiologic dosing and to exclude excess\",\n      \"Treat anyone below the lower limit of the assay\",\n      \"Ignore levels entirely in all situations\"\n    ],\n    correct: 1,\n    answer: \"Female testosterone levels don't define a deficiency state and correlate poorly with symptoms; assays are also unreliable at the low female range. HSDD is a clinical diagnosis made after excluding relationship, mood, medication, and other contributors. Levels serve a safety role — establishing a baseline and ensuring therapy stays physiologic — not a diagnostic one.\",\n    pearl: \"Levels guide safety (the ceiling), not the decision to treat. HSDD is diagnosed clinically.\",\n    cite: \"Global Consensus Position Statement on Testosterone Therapy for Women (2019)\"\n  },\n  {\n    id: \"test-04\", theme: \"testosterone\", level: \"Intermediate\",\n    title: \"Bleeding on testosterone\",\n    stem: \"A 55-year-old postmenopausal woman (LMP 7 years ago), not on estrogen, started low-dose topical testosterone for HSDD a month ago and reports light vaginal bleeding.\",\n    question: \"What's the right action?\",\n    options: [\n      \"Bleeding is an expected testosterone effect — ignore it\",\n      \"Postmenopausal bleeding always warrants evaluation regardless of testosterone use; assess the endometrium and review her estrogen status\",\n      \"Increase the testosterone dose\",\n      \"Stop the testosterone and offer reassurance only\"\n    ],\n    correct: 1,\n    answer: \"Testosterone doesn't excuse postmenopausal bleeding. Any bleeding in a woman 7 years past her LMP requires evaluation to exclude endometrial pathology — transvaginal ultrasound and consideration of biopsy — independent of the testosterone. Also review whether peripheral aromatization or any estrogen exposure is contributing.\",\n    pearl: \"Postmenopausal bleeding is always worked up — testosterone is never the explanation that lets you skip it.\",\n    cite: \"Global Consensus Position Statement on Testosterone Therapy for Women (2019)\"\n  },\n  {\n    id: \"test-05\", theme: \"testosterone\", level: \"Advanced\",\n    title: \"Pellets, injections, and supraphysiologic levels\",\n    stem: \"A patient arrives on testosterone pellets (level 258 ng/dL) placed elsewhere for 'sleep and energy,' with a rising LDL. She's worried about how she'll feel as it wears off.\",\n    question: \"What's the best management?\",\n    options: [\n      \"Replace the pellet to keep her level steady\",\n      \"Counsel that pellets/injections produce supraphysiologic levels and aren't recommended; discontinue, expect levels to normalize over months, address adverse effects (e.g., lipids), and reserve physiologic transdermal testosterone for HSDD if indicated\",\n      \"Switch her to high-dose transdermal testosterone\",\n      \"Start estrogen to offset the testosterone\"\n    ],\n    correct: 1,\n    answer: \"Pellets and injections drive supraphysiologic testosterone (this patient at 258 ng/dL) with off-target effects including adverse lipid changes and virilization, and they were never an evidence-based indication ('sleep and energy'). Discontinue, counsel that levels may take months to normalize, manage adverse effects, and only consider physiologic transdermal testosterone if she has true HSDD.\",\n    pearl: \"Supraphysiologic pellets/injections cause harm and lack indication. De-escalate to physiologic transdermal dosing if needed at all.\",\n    cite: \"Global Consensus Position Statement on Testosterone Therapy for Women (2019)\"\n  },\n  {\n    id: \"test-06\", theme: \"testosterone\", level: \"Intermediate\",\n    title: \"Flibanserin, alcohol, and the toolbox\",\n    stem: \"A clinician considers flibanserin for a patient with HSDD on citalopram and is unsure about the alcohol warning and SSRI interaction.\",\n    question: \"What's accurate about HSDD pharmacotherapy?\",\n    options: [\n      \"Flibanserin still requires REMS and is absolutely contraindicated with any alcohol whatsoever\",\n      \"For premenopausal HSDD, flibanserin (REMS no longer required) needs counseling on alcohol/CNS-depressant and SSRI interactions; bremelanotide is another premenopausal option; for postmenopausal HSDD, testosterone has the best evidence\",\n      \"Testosterone is contraindicated in all HSDD\",\n      \"No pharmacotherapy works for HSDD\"\n    ],\n    correct: 1,\n    answer: \"Flibanserin and bremelanotide are FDA-approved for premenopausal HSDD; flibanserin no longer carries a REMS, but its CNS-depressant/alcohol interaction and additive effects with SSRIs (and CYP interactions) require counseling. For postmenopausal women, transdermal testosterone has the strongest evidence. Match the agent to menopausal status and comorbidities.\",\n    pearl: \"Know the HSDD toolbox: testosterone (postmenopausal), flibanserin/bremelanotide (premenopausal), and their interaction caveats.\",\n    cite: \"Global Consensus Position Statement on Testosterone Therapy for Women (2019)\"\n  },\n\n  // ───────────── Thrombosis & clotting risk ─────────────\n  {\n    id: \"clot-01\", theme: \"thrombosis\", level: \"Intermediate\",\n    title: \"Factor V Leiden, no prior clot\",\n    stem: \"A 43-year-old who is heterozygous for Factor V Leiden (no personal VTE history; affected mother) wants hormone therapy for symptoms.\",\n    question: \"What's the appropriate approach?\",\n    options: [\n      \"Any hormone therapy is absolutely contraindicated\",\n      \"Transdermal estradiol avoids first-pass metabolism and carries little to no increased VTE risk; it's the preferred route in thrombophilia/elevated VTE risk, with shared decision-making (and hematology input for high-risk thrombophilias)\",\n      \"Oral estrogen is perfectly acceptable here\",\n      \"Only oral estrogen should be used\"\n    ],\n    correct: 1,\n    answer: \"Oral estrogen raises VTE risk through hepatic first-pass effects; transdermal estradiol largely avoids this and is associated with little or no increased VTE risk. Heterozygous Factor V Leiden without prior VTE is not an absolute contraindication — transdermal estradiol with shared decision-making is reasonable, and high-risk thrombophilias warrant hematology input.\",\n    pearl: \"Transdermal beats oral for VTE risk. Heterozygous FVL without prior clot isn't an absolute 'no' to transdermal.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n  {\n    id: \"clot-02\", theme: \"thrombosis\", level: \"Foundational\",\n    title: \"Acute clot on the patch\",\n    stem: \"A 42-year-old on an estradiol patch (started 4 months ago for VMS) presents with a new acute DVT. She also has antiphospholipid antibodies pending confirmation in another patient you're considering.\",\n    question: \"What's the immediate management of estrogen here?\",\n    options: [\n      \"Continue the estrogen — it's transdermal\",\n      \"Stop systemic estrogen with an acute VTE event; high-risk thrombophilias such as antiphospholipid syndrome warrant caution and specialist coordination even for transdermal therapy\",\n      \"Switch her to oral estrogen\",\n      \"Increase the estrogen to manage rebound symptoms\"\n    ],\n    correct: 1,\n    answer: \"An acute VTE event means stopping systemic estrogen and managing the clot (anticoagulation, hematology). While transdermal estradiol is lower-risk than oral, an active event overrides that. Antiphospholipid syndrome is a high-risk state where even transdermal estrogen requires caution and specialist coordination.\",\n    pearl: \"Acute VTE → stop systemic estrogen. APS and high-risk thrombophilia demand specialist coordination even transdermally.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n  {\n    id: \"clot-03\", theme: \"thrombosis\", level: \"Intermediate\",\n    title: \"A remote, provoked DVT\",\n    stem: \"A 43-year-old had a DVT a decade ago, clearly provoked by a combined oral contraceptive plus a leg fracture, with a negative thrombophilia work-up afterward. She now wants hormone therapy.\",\n    question: \"How do you advise her?\",\n    options: [\n      \"Her history is a lifelong contraindication to any estrogen\",\n      \"Transdermal estradiol is reasonable with shared decision-making — a remote, provoked event with a negative thrombophilia work-up is relatively reassuring; avoid oral estrogen\",\n      \"Oral estrogen is fine given the time elapsed\",\n      \"She needs lifelong anticoagulation before any estrogen\"\n    ],\n    correct: 1,\n    answer: \"A remote, provoked VTE that has fully resolved with a negative thrombophilia work-up represents a lower-risk scenario. Transdermal estradiol, which doesn't meaningfully raise VTE risk, is often acceptable with thorough shared decision-making; oral estrogen should be avoided. Hematology input can help quantify residual risk if uncertain.\",\n    pearl: \"Provoked + resolved + negative work-up + transdermal route = often acceptable with shared decision-making.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n  {\n    id: \"clot-04\", theme: \"thrombosis\", level: \"Advanced\",\n    title: \"Established coronary disease wants MHT\",\n    stem: \"A woman with known coronary artery disease (or a high CAC score / strong CV risk profile) has bothersome VMS and asks about systemic hormone therapy.\",\n    question: \"What's the guideline-aligned counseling?\",\n    options: [\n      \"Hormone therapy treats coronary disease — start it for cardioprotection\",\n      \"Systemic HT is not for cardiovascular protection and is generally avoided with established CVD or high CV risk; prefer nonhormone VMS therapy, and consider transdermal estradiol only after risk optimization with careful shared decision-making\",\n      \"Use oral estrogen to improve her lipid profile\",\n      \"There are no cardiovascular restrictions on HT\"\n    ],\n    correct: 1,\n    answer: \"Hormone therapy is not indicated for cardiovascular protection, and established coronary disease or high CV risk shifts the risk–benefit unfavorably (timing hypothesis). For bothersome VMS, lead with nonhormone options. If hormones are still pursued after risk-factor optimization and shared decision-making, the transdermal route is preferred.\",\n    pearl: \"Never start HT for cardioprotection. Established CVD favors nonhormone VMS therapy.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n\n  // ───────────── Bone, POI & early menopause ─────────────\n  {\n    id: \"bone-01\", theme: \"bone\", level: \"Intermediate\",\n    title: \"Dosing for POI\",\n    stem: \"A woman in her late 30s with primary ovarian insufficiency is on estradiol 1 mg + progesterone. A clinician asks whether she should be dosed like a typical menopausal patient.\",\n    question: \"What's different about POI?\",\n    options: [\n      \"Use standard low menopausal doses\",\n      \"POI/early menopause needs higher, physiologic estrogen replacement (e.g., ~100 mcg patch or 2 mg oral estradiol) continued at least until the average age of menopause (~51), with adequate progestogen\",\n      \"Avoid hormone therapy in POI\",\n      \"The same 'within 10 years / age 60' limits apply\"\n    ],\n    correct: 1,\n    answer: \"Primary ovarian insufficiency is replacement of hormones a young body should still be making — not 'menopausal therapy.' It requires higher, physiologic estradiol doses (around a 100-mcg patch or 2 mg oral) with an adequate progestogen for endometrial protection, continued at least to the average age of natural menopause (~51) to protect bone, cardiovascular, and cognitive health.\",\n    pearl: \"POI is replacement to physiologic levels until ~51 — the menopause timing limits don't apply.\",\n    cite: \"TMS / NAMS Primary Ovarian Insufficiency guidance\"\n  },\n  {\n    id: \"bone-02\", theme: \"bone\", level: \"Advanced\",\n    title: \"Premature menopause, now beyond 10 years\",\n    stem: \"A 56-year-old who went through menopause in her mid-30s has osteopenia and mild brain fog but no VMS. She's under 60 but well beyond 10 years from menopause onset, and wonders if the timing rule excludes her.\",\n    question: \"How does the timing window apply?\",\n    options: [\n      \"She's >10 years out, so hormone therapy is contraindicated\",\n      \"For premature/early menopause, replacement is recommended at least to the typical age of menopause, and the 'within 10 years' caution is calibrated to normal menopause age — her early estrogen deprivation and bone loss support individualized HT\",\n      \"Use a bisphosphonate only; she can never have HT\",\n      \"Start high-dose oral estrogen immediately\"\n    ],\n    correct: 1,\n    answer: \"The 'within 10 years / before age 60' framing is anchored to the normal age of menopause; it isn't meant to penalize women who lost ovarian function prematurely. Early, prolonged estrogen deficiency drives bone loss and other risks, so replacement is recommended at least to the average age of menopause, individualized to her overall risk profile.\",\n    pearl: \"The timing window is calibrated to expected menopause age — early menopause with bone loss supports HT.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n  {\n    id: \"bone-03\", theme: \"bone\", level: \"Intermediate\",\n    title: \"70 and wants HT for her bones\",\n    stem: \"A 70-year-old, 15+ years postmenopausal with osteoporosis and no menopausal symptoms, wants to start hormone therapy 'to build bone' and prevent the dementia her mother had.\",\n    question: \"What's the appropriate guidance?\",\n    options: [\n      \"Start hormone therapy for both bone and dementia prevention\",\n      \"In women many years past menopause, HT is not first-line for established osteoporosis and is not indicated for dementia prevention; use bone-specific therapy (e.g., a bisphosphonate) — initiating HT now carries an unfavorable risk–benefit balance\",\n      \"Hormone therapy prevents dementia — start it\",\n      \"Use testosterone to build her bone\"\n    ],\n    correct: 1,\n    answer: \"Although estrogen preserves bone, it is not the treatment of choice for established osteoporosis in an older woman far from menopause, and it is not indicated for dementia prevention — late initiation may even increase dementia and vascular risk. Use a bone-specific agent such as a bisphosphonate; initiating systemic HT at 70 has an unfavorable risk–benefit balance.\",\n    pearl: \"HT preserves bone but isn't first-line for established osteoporosis in older women — and never for dementia prevention.\",\n    cite: \"TMS / NAMS Management of Osteoporosis Position Statement\"\n  },\n  {\n    id: \"bone-04\", theme: \"bo
