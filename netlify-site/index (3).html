ne\", level: \"Advanced\",\n    title: \"Diagnosing status through hormonal contraception\",\n    stem: \"A 38-year-old with amenorrhea on a hormonal IUD has an ambiguous picture; a colleague wants to diagnose menopause/POI from a single FSH and an AMH.\",\n    question: \"What's the right diagnostic approach?\",\n    options: [\n      \"FSH drawn on hormonal contraception reliably establishes menopausal status\",\n      \"Diagnosis is clinical; FSH and estradiol are unreliable on hormonal contraception and in perimenopause; POI requires elevated FSH in the menopausal range on ≥2 occasions with amenorrhea/oligomenorrhea before age 40, off confounders\",\n      \"AMH alone diagnoses menopause\",\n      \"A single FSH is sufficient to diagnose POI\"\n    ],\n    correct: 1,\n    answer: \"In women over 45 with typical symptoms, menopause is a clinical diagnosis and labs aren't needed. Hormonal contraception and perimenopausal fluctuation make FSH/estradiol unreliable. POI specifically requires menopausal-range FSH on at least two occasions, several weeks apart, with menstrual disturbance before age 40 — interpreted off confounding hormones.\",\n    pearl: \"Don't diagnose menopausal status from labs drawn through contraception. POI needs repeat menopausal-range FSH before 40.\",\n    cite: \"TMS / NAMS Primary Ovarian Insufficiency guidance\"\n  },\n\n  // ───────────── Breast cancer risk & screening ─────────────\n  {\n    id: \"breast-01\", theme: \"breast\", level: \"Intermediate\",\n    title: \"High lifetime risk wants MHT\",\n    stem: \"A 48-year-old with bothersome VMS has an elevated breast cancer lifetime risk (Tyrer-Cuzick >20%) and an intact uterus. She wants hormone therapy.\",\n    question: \"What's the appropriate counseling?\",\n    options: [\n      \"Hormone therapy is absolutely contraindicated at any elevated risk\",\n      \"Elevated breast cancer risk isn't an absolute contraindication but shifts the risk–benefit balance; EPT raises breast cancer risk with duration, so use shared decision-making, prioritize nonhormone VMS options, and involve breast specialists for very high risk\",\n      \"Prescribe estrogen–progestogen therapy freely\",\n      \"Estrogen-only therapy is fine even with her uterus\"\n    ],\n    correct: 1,\n    answer: \"A personal history of breast cancer is generally a contraindication, but elevated risk by a model is not absolute — it shifts the conversation. Combined estrogen–progestogen therapy increases breast cancer risk with increasing duration of use. Favor nonhormone VMS options, use careful shared decision-making, and involve breast specialists when risk is very high.\",\n    pearl: \"High risk shifts the balance and favors nonhormone options — it's shared decision-making, not a blanket no.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n  {\n    id: \"breast-02\", theme: \"breast\", level: \"Advanced\",\n    title: \"Estrogen-alone and the breast\",\n    stem: \"A clinician recalls that estrogen-only therapy might behave differently from combined therapy on breast cancer risk and asks about a woman without a uterus who has elevated breast risk.\",\n    question: \"What does the evidence show?\",\n    options: [\n      \"Estrogen-alone raises breast cancer risk just like combined therapy\",\n      \"In the WHI, estrogen-alone (in women without a uterus) did not increase — and may have reduced — breast cancer risk; the progestogen component drives most of the breast cancer signal in combined therapy\",\n      \"Estrogen-alone still requires a progestogen for breast safety\",\n      \"Estrogen-alone is contraindicated regardless\"\n    ],\n    correct: 1,\n    answer: \"WHI data showed that conjugated estrogen alone in women without a uterus did not increase breast cancer risk and was associated with a reduction in incidence and mortality. Most of the breast cancer signal in combined therapy is attributed to the progestogen. This gives women without a uterus a more favorable breast profile — though risk is individualized.\",\n    pearl: \"The progestogen drives most of the EPT breast signal; estrogen-alone (no uterus) has a more favorable profile.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n  {\n    id: \"breast-03\", theme: \"breast\", level: \"Intermediate\",\n    title: \"She refuses mammograms\",\n    stem: \"A woman who is firmly opposed to mammography wants to start hormone therapy. A colleague asks whether refusing screening is a hard stop.\",\n    question: \"What's the appropriate stance?\",\n    options: [\n      \"Refusing mammograms is an absolute contraindication to hormone therapy\",\n      \"Screening refusal isn't an automatic contraindication; perform risk assessment, counsel and document informed shared decision-making — while being clear that mammography is the validated screening test and ultrasound/MRI are adjuncts, not replacements\",\n      \"Accept breast ultrasound as an equivalent screening test\",\n      \"Require breast MRI before any hormone therapy\"\n    ],\n    correct: 1,\n    answer: \"A patient's autonomous refusal of screening doesn't, by itself, bar hormone therapy. Do a structured risk assessment, counsel thoroughly, and document shared decision-making. Be clear that mammography is the evidence-based screening modality; ultrasound and MRI are adjuncts in specific situations, not substitutes for population screening.\",\n    pearl: \"Screening refusal isn't an automatic no — assess risk, counsel, document. Mammography remains the standard test.\",\n    cite: \"Menopause Practice: A Clinician's Guide, 6th ed.\"\n  },\n  {\n    id: \"breast-04\", theme: \"breast\", level: \"Intermediate\",\n    title: \"Dense breasts and the MRI question\",\n    stem: \"A woman with a normal mammogram, dense breasts, and a lifetime risk under 20% read a recommendation to 'consider yearly MRI' and now requests one.\",\n    question: \"What's the evidence-based guidance?\",\n    options: [\n      \"Supplemental MRI is indicated for all women with dense breasts\",\n      \"Supplemental MRI is generally recommended when lifetime risk is ≥20%; with dense breasts and lower risk it's an individualized discussion (and coverage varies) — use a validated risk model to guide the decision\",\n      \"MRI replaces the mammogram in dense breasts\",\n      \"No additional imaging is ever warranted\"\n    ],\n    correct: 1,\n    answer: \"Annual supplemental MRI is recommended for women at high lifetime risk (≥20% by a validated model). Breast density alone with otherwise lower risk is a more nuanced, individualized conversation about supplemental imaging (often ultrasound) with variable insurance coverage. MRI complements rather than replaces mammography.\",\n    pearl: \"≥20% lifetime risk → MRI adjunct. Density alone with lower risk is an individualized discussion.\",\n    cite: \"Menopause Practice: A Clinician's Guide, 6th ed.\"\n  },\n\n  // ───────────── Cardiometabolic risk ─────────────\n  {\n    id: \"cardio-01\", theme: \"cardiometabolic\", level: \"Intermediate\",\n    title: \"HT to prevent diabetes?\",\n    stem: \"A clinician heard that hormone therapy halves progression to type 2 diabetes and wonders whether metabolic endpoints should drive prescribing decisions.\",\n    question: \"What's the correct framing?\",\n    options: [\n      \"Prescribe hormone therapy to prevent diabetes\",\n      \"Hormone therapy is not indicated for diabetes or cardiovascular prevention; although it has neutral-to-favorable metabolic effects in appropriate candidates, treat menopausal symptoms — not metabolic endpoints — and manage risk factors directly\",\n      \"Hormone therapy worsens all metabolic parameters\",\n      \"Elevated Lp(a) is an absolute contraindication to HT\"\n    ],\n    correct: 1,\n    answer: \"Hormone therapy can have neutral-to-favorable effects on glucose metabolism and body composition in suitable candidates, but it is not indicated for the prevention of diabetes or cardiovascular disease. Prescribe for menopausal symptoms; manage metabolic risk with lifestyle, glucose-lowering, and lipid therapies directly. Elevated Lp(a) is a risk factor to weigh, not an automatic contraindication.\",\n    pearl: \"Symptoms are the indication — not metabolic or cardiovascular prevention. Treat risk factors on their own merits.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n  {\n    id: \"cardio-02\", theme: \"cardiometabolic\", level: \"Advanced\",\n    title: \"High LDL, CAC of zero\",\n    stem: \"A 53-year-old with an LDL of 206 who declines a statin gets a coronary artery calcium score of 0 and a low 10-year risk estimate, and wants systemic hormone therapy for VMS.\",\n    question: \"How does the CAC of 0 inform the plan?\",\n    options: [\n      \"A CAC of 0 means hormone therapy carries no cardiovascular concern, so no other risk management is needed\",\n      \"A CAC of 0 is reassuring for short-term coronary risk and supports that she's a reasonable candidate for transdermal HT, but it doesn't replace managing her markedly elevated LDL — continue to recommend lipid therapy\",\n      \"The high LDL absolutely contraindicates any hormone therapy\",\n      \"Use oral estrogen specifically to lower her LDL\"\n    ],\n    correct: 1,\n    answer: \"A coronary calcium score of 0 is reassuring for near-term coronary risk and can support candidacy for transdermal hormone therapy in an otherwise appropriate woman. It does not, however, address her markedly elevated LDL, which still warrants lifestyle and pharmacologic management. Treat the lipid problem on its own terms rather than expecting estrogen to fix it.\",\n    pearl: \"CAC 0 reassures about short-term coronary risk — but still manage the LDL directly; HT isn't lipid therapy.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n\n  // ───────────── Diagnosis & first principles ─────────────\n  {\n    id: \"prin-01\", theme: \"principles\", level: \"Foundational\",\n    title: \"Contraception or hormone therapy?\",\n    stem: \"A perimenopausal 45-year-old with cycle chaos, VMS, and mood symptoms still needs contraception and asks what to take.\",\n    question: \"What's the key decision driver?\",\n    options: [\n      \"Always choose menopausal hormone therapy\",\n      \"If contraception is needed in perimenopause, a low-dose combined contraceptive (absent contraindications) can manage cycles, symptoms, and pregnancy prevention; MHT does NOT provide contraception — let contraindications (age, smoking, migraine with aura, VTE/CV risk) guide the choice\",\n      \"Use MHT plus condoms only\",\n      \"Progestin-only therapy is always the answer\"\n    ],\n    correct: 1,\n    answer: \"The need for contraception is often the deciding factor in perimenopause. A low-dose combined hormonal contraceptive can simultaneously control bleeding, treat symptoms, and prevent pregnancy when there are no contraindications. Menopausal hormone therapy does not provide contraception. Screen carefully for contraindications — age plus smoking, migraine with aura, and VTE/cardiovascular risk steer the decision.\",\n    pearl: \"MHT isn't contraception. In perimenopause, the need for contraception (and its contraindications) often picks the regimen.\",\n    cite: \"Menopause Practice: A Clinician's Guide, 6th ed.\"\n  },\n  {\n    id: \"prin-02\", theme: \"principles\", level: \"Intermediate\",\n    title: \"Is there a stop date?\",\n    stem: \"A long-term hormone therapy user asks whether she must stop at a particular age, and a colleague believes everyone should stop at 60 or after 5 years.\",\n    question: \"What's the guideline position on duration?\",\n    options: [\n      \"There's a mandatory stop at age 60 or 65\",\n      \"There's no arbitrary maximum duration or stop age; continue with periodic reassessment of benefits/risks at the lowest effective dose — some women continue long-term with informed shared decision-making, and vaginal estrogen can continue indefinitely\",\n      \"Everyone must stop at 5 years\",\n      \"Continue indefinitely with no need for review\"\n    ],\n    correct: 1,\n    answer: \"Current guidance rejects an arbitrary stop age or fixed maximum duration. Decisions are individualized through periodic reassessment of evolving benefits and risks, using the lowest effective dose for the indication. Some symptomatic women reasonably continue long-term with informed shared decision-making, and low-dose vaginal estrogen for GSM can be continued indefinitely.\",\n    pearl: \"No mandatory stop age or duration cap — individualize and reassess periodically. Vaginal estrogen can go indefinitely.\",\n    cite: \"TMS 2022 Hormone Therapy Position Statement\"\n  },\n  {\n    id: \"prin-03\", theme: \"principles\", level: \"Advanced\",\n    title: \"Estrogen and lamotrigine\",\n    stem: \"A patient on lamotrigine for bipolar disorder wants to start transdermal estradiol, and the chart flags a potential interaction.\",\n    question: \"How should you manage it?\",\n    options: [\n      \"There's no meaningful interaction — proceed without changes\",\n      \"Estrogen can lower lamotrigine levels and reduce seizure/mood control; coordinate with neurology/psychiatry, monitor levels and symptoms, and adjust as needed — it's manageable, not an absolute contraindication\",\n      \"It's an absolute contraindication to estrogen\",\n      \"Empirically increase lamotrigine without coordination\"\n    ],\n    correct: 1,\n    answer: \"Estrogen induces lamotrigine glucuronidation and can meaningfully lower lamotrigine levels, risking loss of seizure or mood control (with the reverse on stopping estrogen). This is a real, manageable interaction — coordinate with the prescribing neurologist/psychiatrist, monitor levels and symptoms, and adjust lamotrigine as needed. It's not an absolute barrier to therapy.\",\n    pearl: \"Estrogen lowers lamotrigine levels — co-manage and monitor rather than treating it as a hard contraindication.\",\n    cite: \"Menopause Practice: A Clinician's Guide, 6th ed.\"\n  },\n  {\n    id: \"prin-04\", theme: \"principles\", level: \"Intermediate\",\n    title: \"Late-30s symptoms, normal labs, wants HT\",\n    stem: \"A 39-year-old reports fatigue, low libido, brain fog, and night sweats with regular cycles. POI work-up is negative and labs are normal; she requests hormone therapy and may want to conceive eventually.\",\n    question: \"What's the best approach?\",\n    options: [\n      \"Start systemic hormone therapy immediately\",\n      \"Rule out other causes and POI, then treat symptomatic early perimenopause appropriately (often cyclic progestogen ± low-dose estrogen, or a contraceptive if pregnancy prevention is needed) — but counsel that HT is neither contraception nor fertility treatment and ovulation can still occur\",\n      \"Refuse evaluation and therapy\",\n      \"Start testosterone for her symptoms\"\n    ],\n    correct: 1,\n    answer: \"Perimenopause is a clinical diagnosis; with normal labs, exclude thyroid, anemia, mood, sleep, and medication contributors and confirm POI is ruled out. Symptomatic early perimenopause can be treated — but counsel clearly that menopausal hormone therapy provides neither contraception nor a fertility benefit, and spontaneous ovulation/conception remain possible, so address contraceptive needs explicitly.\",\n    pearl: \"Perimenopause is clinical. HT isn't contraception or fertility treatment — counsel on ongoing pregnancy potential.\",\n    cite: \"Menopause Practice: A Clinician's Guide, 6th ed.\"\n  }\n];\n\n\nconst PAL = {\"25\":{\"c60\":\"#bd615b\",\"bg965\":\"#ffeeec\",\"bg96\":\"#ffece9\",\"bg92\":\"#ffd8d4\",\"b90\":\"#f5d6d2\",\"b70\":\"#cc8b85\",\"t42\":\"#733a36\",\"t40\":\"#6c3531\"},\"50\":{\"c60\":\"#b86838\",\"bg965\":\"#fff0e7\",\"bg96\":\"#ffede3\",\"bg92\":\"#ffdcc8\",\"b90\":\"#f2d8ca\",\"b70\":\"#c79071\",\"t42\":\"#6f3f22\",\"t40\":\"#69391c\"},\"95\":{\"c60\":\"#977e0d\",\"bg965\":\"#f8f4e3\",\"bg96\":\"#f7f2df\",\"bg92\":\"#efe5c0\",\"b90\":\"#e5dec5\",\"b70\":\"#ae9e64\",\"t42\":\"#5b4c0d\",\"t40\":\"#554704\"},\"145\":{\"c60\":\"#4d9351\",\"bg965\":\"#ebf8eb\",\"bg96\":\"#e8f7e8\",\"bg92\":\"#d1eed1\",\"b90\":\"#d0e5d0\",\"b70\":\"#7fac80\",\"t42\":\"#2f5831\",\"t40\":\"#29532b\"},\"190\":{\"c60\":\"#009690\",\"bg965\":\"#e4f9f7\",\"bg96\":\"#e0f8f5\",\"bg92\":\"#bff0ec\",\"b90\":\"#c5e6e3\",\"b70\":\"#5eafa9\",\"t42\":\"#005b57\",\"t40\":\"#005551\"},\"220\":{\"c60\":\"#0090b1\",\"bg965\":\"#e4f7fe\",\"bg96\":\"#e0f6fe\",\"bg92\":\"#c1edfc\",\"b90\":\"#c6e4ee\",\"b70\":\"#61aac1\",\"t42\":\"#00576b\",\"t40\":\"#005165\"},\"255\":{\"c60\":\"#4c82c6\",\"bg965\":\"#eaf5ff\",\"bg96\":\"#e7f3ff\",\"bg92\":\"#cfe7ff\",\"b90\":\"#cfe0f6\",\"b70\":\"#7da1d0\",\"t42\":\"#2d4e78\",\"t40\":\"#284972\"},\"280\":{\"c60\":\"#7377c6\",\"bg965\":\"#f0f2ff\",\"bg96\":\"#eef0ff\",\"bg92\":\"#dde2ff\",\"b90\":\"#d9dcf6\",\"b70\":\"#9499d0\",\"t42\":\"#454778\",\"t40\":\"#404272\"},\"320\":{\"c60\":\"#a067ac\",\"bg965\":\"#faeffd\",\"bg96\":\"#faedfd\",\"bg92\":\"#f4dafa\",\"b90\":\"#e9d7ed\",\"b70\":\"#b58ebe\",\"t42\":\"#603e68\",\"t40\":\"#5b3862\"},\"350\":{\"c60\":\"#b4608a\",\"bg965\":\"#ffeef5\",\"bg96\":\"#ffebf4\",\"bg92\":\"#ffd8e9\",\"b90\":\"#f1d5e1\",\"b70\":\"#c58aa5\",\"t42\":\"#6d3a53\",\"t40\":\"#67344e\"}};\n\nclass Component extends DCLogic {\n  state = {\n    view: \"library\",\n    activeId: null,\n    cases: CASES,\n    themes: THEMES,\n    filterTheme: \"all\",\n    filterLevel: \"all\",\n    search: \"\",\n    draft: {},\n    progress: {},\n  };\n\n  componentDidMount() {\n    try {\n      const raw = localStorage.getItem(\"rlmc-progress-v1\");\n      if (raw) this.setState({ progress: JSON.parse(raw) || {} });\n    } catch (e) {}\n  }\n\n  persist(progress) {\n    try { localStorage.setItem(\"rlmc-progress-v1\", JSON.stringify(progress)); } catch (e) {}\n  }\n\n  // ---- color helpers ----\n  dot(hue, size) {\n    const s = size || 8;\n    return `display:inline-block;width:${s}px;height:${s}px;border-radius:50%;background:${PAL[hue].c60};flex:none;`;\n  }\n  chip(hue, active) {\n    const bg = active ? PAL[hue].bg92 : PAL[hue].bg965;\n    const bd = active ? PAL[hue].b70 : PAL[hue].b90;\n    const tx = PAL[hue].t40;\n    return `display:inline-flex;align-items:center;gap:7px;font-family:'Hanken Grotesk',sans-serif;font-size:12.5px;font-weight:${active ? 600 : 500};color:${tx};background:${bg};border:1px solid ${bd};border-radius:30px;padding:6px 13px;cursor:pointer;white-space:nowrap;transition:background .15s,border-color .15s;`;\n  }\n\n  themeOf(key) { return (this.state.themes || []).find((t) => t.key === key); }\n\n  // ---- handlers ----\n  go(id) { this.setState({ view: \"case\", activeId: id }); window.scrollTo(0, 0); }\n  back() { this.setState({ view: \"library\" }); window.scrollTo(0, 0); }\n  pick(theme) { this.setState({ filterTheme: theme }); }\n  pickLevel(l) { this.setState({ filterLevel: l }); }\n  setSearch(v) { this.setState({ search: v }); }\n  clearFilters() { this.setState({ filterTheme: \"all\", filterLevel: \"all\", search: \"\" }); }\n  resetAll() {\n    if (typeof confirm === \"function\" && !confirm(\"Reset all progress and scores?\")) return;\n    this.persist({});\n    this.setState({ progress: {}, draft: {} });\n  }\n  select(id, i) {\n    if (this.state.progress[id]) return;\n    this.setState({ draft: { ...this.state.draft, [id]: i } });\n  }\n  commit(id) {\n    const sel = this.state.draft[id];\n    if (sel == null) return;\n    const c = this.state.cases.find((x) => x.id === id);\n    const progress = { ...this.state.progress, [id]: { sel, correct: sel === c.correct } };\n    this.persist(progress);\n    this.setState({ progress });\n  }\n  resetCase(id) {\n    const progress = { ...this.state.progress };\n    delete progress[id];\n    const draft = { ...this.state.draft };\n    delete draft[id];\n    this.persist(progress);\n    this.setState({ progress, draft });\n  }\n  navList() {\n    const f = this.filtered();\n    return f.length ? f : this.state.cases || [];\n  }\n  step(dir) {\n    const list = this.navList();\n    const idx = list.findIndex((c) => c.id === this.state.activeId);\n    const ni = idx + dir;\n    if (ni < 0 || ni >= list.length) return;\n    this.setState({ activeId: list[ni].id });\n    window.scrollTo(0, 0);\n  }\n\n  filtered() {\n    const { cases, filterTheme, filterLevel, search } = this.state;\n    if (!cases) return [];\n    const q = (search || \"\").trim().toLowerCase();\n    return cases.filter((c) => {\n      if (filterTheme !== \"all\" && c.theme !== filterTheme) return false;\n      if (filterLevel !== \"all\" && c.level !== filterLevel) return false;\n      if (q) {\n        const hay = (c.title + \" \" + c.stem + \" \" + c.question + \" \" + c.answer + \" \" + c.pearl).toLowerCase();\n        if (!hay.includes(q)) return false;\n      }\n      return true;\n    });\n  }\n\n  statusOf(id) {\n    const p = this.state.progress[id];\n    if (!p) return \"new\";\n    return p.correct ? \"correct\" : \"missed\";\n  }\n  statusStyle(st) {\n    const base = \"font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:0.07em;text-transform:uppercase;padding:3px 8px;border-radius:20px;white-space:nowrap;\";\n    if (st === \"correct\") return base + \"color:#2F7A55;background:#E7F1EA;border:1px solid #C4DfCd;\";\n    if (st === \"missed\") return base + \"color:#B24A4A;background:#F6E9E7;border:1px solid #E6CBC6;\";\n    return base + \"color:#A39E93;background:#F3EFE6;border:1px solid #E5DFD2;\";\n  }\n  statusLabel(st) { return st === \"correct\" ? \"answered well\" : st === \"missed\" ? \"revisit\" : \"new\"; }\n\n  renderVals() {\n    const { cases, themes, view, activeId } = this.state;\n    const accent = this.props.accent || \"#2F6B66\";\n    const showPearls = this.props.showPearls !== false;\n    const showCitations = this.props.showCitations !== false;\n\n    if (!cases || !themes) {\n      return { loading: true, isLibrary: false, isCase: false, accent, showPearls, showCitations, onHome: () => this.back() };\n    }\n\n    const isLibrary = view === \"library\";\n    const isCase = view === \"case\";\n\n    // ---- stats ----\n    const total = cases.length;\n    const prog = this.state.progress;\n    const attempted = Object.keys(prog).length;\n    const correct = Object.values(prog).filter((p) => p.correct).length;\n    const accuracyNum = attempted ? Math.round((correct / attempted) * 100) : 0;\n    const C = 2 * Math.PI * 52;\n    const stats = {\n      accuracy: attempted ? accuracyNum : \"\\u2014\",\n      exploredLabel: `${attempted}/${total}`,\n      correctLabel: String(correct),\n      ringDashArray: C.toFixed(1),\n      ringDashOffset: (C * (1 - accuracyNum / 100)).toFixed(1),\n      ringColor: accent,\n      ringTrack: \"#E2DCCF\",\n    };\n\n    // ---- theme mastery ----\n    const themeMastery = themes.map((t) => {\n      const inTheme = cases.filter((c) => c.theme === t.key);\n      const att = inTheme.filter((c) => prog[c.id]).length;\n      const frac = inTheme.length ? att / inTheme.length : 0;\n      return {\n        label: t.label,\n        onClick: () => this.pick(t.key),\n        dotStyle: this.dot(t.hue, 8),\n        fillStyle: `position:absolute;left:0;top:0;height:100%;border-radius:3px;width:${Math.round(frac * 100)}%;background:${PAL[t.hue].c60};`,\n        countLabel: `${att}/${inTheme.length}`,\n      };\n    });\n\n    // ---- theme chips ----\n    const themeChips = [\n      {\n        label: \"All themes\",\n        countLabel: String(total),\n        onClick: () => this.pick(\"all\"),\n        style: \"\",\n        dotStyle: \"display:none;\",\n      },\n    ];\n    // make \"All\" neutral\n    themeChips[0].style = `display:inline-flex;align-items:center;gap:6px;font-family:'Hanken Grotesk',sans-serif;font-size:12.5px;font-weight:${this.state.filterTheme === \"all\" ? 600 : 500};color:${this.state.filterTheme === \"all\" ? \"#fff\" : \"#5C5750\"};background:${this.state.filterTheme === \"all\" ? \"#211F1B\" : \"#F3EFE6\"};border:1px solid ${this.state.filterTheme === \"all\" ? \"#211F1B\" : \"#E5DFD2\"};border-radius:30px;padding:6px 14px;cursor:pointer;white-space:nowrap;`;\n    themes.forEach((t) => {\n      const active = this.state.filterTheme === t.key;\n      themeChips.push({\n        label: t.short,\n        countLabel: String(cases.filter((c) => c.theme === t.key).length),\n        onClick: () => this.pick(t.key),\n        style: this.chip(t.hue, active),\n        dotStyle: this.dot(t.hue, 7),\n      });\n    });\n\n    // ---- level chips ----\n    const levels = [\"all\", \"Foundational\", \"Intermediate\", \"Advanced\"];\n    const levelLabels = { all: \"All levels\", Foundational: \"Foundational\", Intermediate: \"Intermediate\", Advanced: \"Advanced\" };\n    const levelChips = levels.map((l) => {\n      const active = this.state.filterLevel === l;\n      return {\n        label: levelLabels[l],\n        onClick: () => this.pickLevel(l),\n        style: `font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.02em;color:${active ? \"#fff\" : \"#7A746A\"};background:${active ? accent : \"transparent\"};border:1px solid ${active ? accent : \"#D8D1C2\"};border-radius:4px;padding:7px 11px;cursor:pointer;white-space:nowrap;`,\n      };\n    });\n\n    // ---- filtered cards ----\n    const fc = this.filtered();\n    const filteredCases = fc.map((c) => {\n      const t = this.themeOf(c.theme);\n      const st = this.statusOf(c.id);\n      return {\n        title: c.title,\n        preview: c.stem.length > 138 ? c.stem.slice(0, 138).trim() + \"\\u2026\" : c.stem,\n        level: c.level,\n        themeShort: t.short,\n        chipStyle: `display:inline-flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.04em;text-transform:uppercase;color:${PAL[t.hue].t42};background:${PAL[t.hue].bg965};border-radius:20px;padding:3px 9px;`,\n        dotStyle: this.dot(t.hue, 6),\n        statusStyle: this.statusStyle(st),\n        statusLabel: this.statusLabel(st),\n        onClick: () => this.go(c.id),\n      };\n    });\n\n    const out = {\n      loading: false,\n      isLibrary,\n      isCase,\n      accent,\n      showPearls,\n      showCitations,\n      onHome: () => this.back(),\n      stats,\n      themeMastery,\n      themeChips,\n      levelChips,\n      filteredCases,\n      noResults: isLibrary && filteredCases.length === 0,\n      search: this.state.search,\n      onSearch: (e) => this.setSearch(e.target.value),\n      onResetAll: () => this.resetAll(),\n      onClearFilters: () => this.clearFilters(),\n    };\n\n    // ---- case detail ----\n    if (isCase && activeId) {\n      const c = cases.find((x) => x.id === activeId);\n      const t = this.themeOf(c.theme);\n      const committed = !!prog[c.id];\n      const sel = committed ? prog[c.id].sel : (this.state.draft[c.id] != null ? this.state.draft[c.id] : null);\n      const letters = [\"A\", \"B\", \"C\", \"D\", \"E\"];\n\n      const caseOptions = c.options.map((text, i) => {\n        let bg = \"#FCFBF7\", bd = \"#E7E1D5\", color = \"#33302A\", letterBg = \"#EDE8DD\", letterColor = \"#7A746A\", badge = \"\", badgeStyle = \"\", cursor = committed ? \"default\" : \"pointer\";\n        if (!committed) {\n          if (sel === i) { bd = accent; bg = \"#fff\"; letterBg = accent; letterColor = \"#fff\"; color = \"#211F1B\"; }\n        } else {\n          if (i === c.correct) {\n            bd = \"#3E9468\"; bg = \"#EEF6F0\"; letterBg = \"#2F7A55\"; letterColor = \"#fff\"; color = \"#1F4A36\";\n            badge = \"Guideline-aligned\"; badgeStyle = \"font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:0.05em;text-transform:uppercase;color:#2F7A55;background:#DCEDE2;border-radius:20px;padding:3px 9px;white-space:nowrap;flex:none;\";\n          } else if (i === sel) {\n            bd = \"#D6A29C\"; bg = \"#FAF0EE\"; letterBg = \"#B24A4A\"; letterColor = \"#fff\"; color = \"#6B3833\";\n            badge = \"Your choice\"; badgeStyle = \"font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:0.05em;text-transform:uppercase;color:#B24A4A;background:#F0DAD6;border-radius:20px;padding:3px 9px;white-space:nowrap;flex:none;\";\n          } else {\n            bg = \"#FAF8F3\"; color = \"#9A958B\"; letterColor = \"#B5B0A5\"; letterBg = \"#F0ECE2\";\n          }\n        }\n        return {\n          letter: letters[i],\n          text,\n          badge,\n          badgeStyle,\n          letterStyle: `flex:none;width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;background:${letterBg};color:${letterColor};`,\n          style: `display:flex;align-items:center;gap:13px;padding:14px 16px;border:1.5px solid ${bd};background:${bg};border-radius:6px;cursor:${cursor};color:${color};transition:border-color .15s,background .15s;`,\n          onClick: committed ? null : () => this.select(c.id, i),\n        };\n      });\n\n      const list = this.navList();\n      const idx = list.findIndex((x) => x.id === c.id);\n\n      out.ac = {\n        title: c.title,\n        stem: c.stem,\n        question: c.question,\n        answer: c.answer,\n        pearl: c.pearl,\n        cite: c.cite,\n        level: c.level,\n        themeLabel: t.label,\n        chipStyle: `display:inline-flex;align-items:center;gap:7px;font-family:'IBM Plex Mono',monospace;font-size:10.5px;letter-spacing:0.04em;text-transform:uppercase;color:${PAL[t.hue].t40};background:${PAL[t.hue].bg96};border-radius:20px;padding:4px 11px;`,\n        dotStyle: this.dot(t.hue, 7),\n        posLabel: `Case ${idx + 1} of ${list.length}`,\n      };\n      out.caseOptions = caseOptions;\n      out.canReveal = !committed && sel != null;\n      out.revealed = committed;\n      out.revealBtnStyle = `margin-top:22px;width:100%;font-family:'Hanken Grotesk',sans-serif;font-size:14px;font-weight:600;color:#fff;background:${accent};border:none;border-radius:6px;padding:14px;cursor:pointer;letter-spacing:0.01em;`;\n      out.onReveal = () => this.commit(c.id);\n      out.onResetCase = () => this.resetCase(c.id);\n      out.onBack = () => this.back();\n      out.onPrev = () => this.step(-1);\n      out.onNext = () => this.step(1);\n\n      const navBtn = (disabled) => `font-family:'Hanken Grotesk',sans-serif;font-size:13px;font-weight:500;color:${disabled ? \"#C2BCB0\" : \"#211F1B\"};background:#fff;border:1px solid ${disabled ? \"#EAE4D8\" : \"#D8D1C2\"};border-radius:5px;padding:11px 18px;cursor:${disabled ? \"default\" : \"pointer\"};`;\n      out.prevStyle = navBtn(idx <= 0);\n      out.nextStyle = navBtn(idx >= list.length - 1);\n\n      if (committed) {\n        const ok = prog[c.id].correct;\n        out.result = {\n          text: ok ? \"\\u2713  Guideline-aligned \\u2014 nicely reasoned.\" : \"\\u2192  Not the preferred answer. Here's the evidence-based approach.\",\n          style: ok\n            ? \"font-family:'Hanken Grotesk',sans-serif;font-size:14px;font-weight:600;color:#1F5C40;background:#E7F1EA;border:1px solid #C4DFCD;border-radius:6px;padding:13px 16px;\"\n            : \"font-family:'Hanken Grotesk',sans-serif;font-size:14px;font-weight:600;color:#8A3A37;background:#F6E9E7;border:1px solid #E6CBC6;border-radius:6px;padding:13px 16px;\",\n        };\n      } else {\n        out.result = { text: \"\", style: \"display:none;\" };\n      }\n    }\n\n    return out;\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
